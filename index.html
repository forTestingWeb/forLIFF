<!DOCTYPE html>
<html>
<head>
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<link rel="stylesheet" type="text/css" media="all" href="style.css">
<title>読み込み中…</title>
<base target="_top">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
// 3時間経過で閉じる
const limitMs = 10*1000;

 setTimeout(() => {
  window.close();   // 自動クローズ
}, limitMs);
// ピンチインピンチアウト禁止
document.documentElement.addEventListener('touchstart', function (e) {
  if (e.touches.length >= 2) e.preventDefault();
}, { passive: false });

// ダブルタップ拡大禁止
let t = 0;
document.documentElement.addEventListener('touchend', function (e) {
  const now = new Date().getTime();
  if (now - t < 350) e.preventDefault();
  t = now;
}, false);
</script>
</head>

<body>
<div id="loader">
  <svg width="100%" height="120">
    <text x="50%" y="100" font-size="32px" text-anchor="middle" fill="#fff">
      読込中…
    </text>
  </svg>
</div>

<div class="iframe-wrap">
  <iframe class="embed" id="embed" src="about:blank" allow="geolocation"></iframe>
</div>

<script>
const loader = document.getElementById('loader');
const params = new URL(document.location).searchParams;

let lm="", op="", id="", title="";
let userId = "none";
let flag = params.get('flag') ? Number(params.get('flag')) : 0;

const ua = navigator.userAgent;
let iOSflag = params.get('iOSflag') ? 1 : 0;
let ext = params.get('ext');

init();

function init() {
  liff.init({ liffId: "2005353358-O06e5Z4z" }).then(() => {

    if (liff.isInClient()) {
        //外部ブラウザで開くオプション
      if (ext=="true") {
        const location = document.location + "&ext=true";
        liff.openWindow({ url: location, external: true });
        liff.closeWindow();
        document.title = "このウィンドウは閉じてください。";
        return;
      }
      liff.ready.then(() => {
        if (ua.indexOf('iPad') > 0 && !iOSflag) {
          const location = document.location + "&iOSflag=1";
          liff.openWindow({ url: location, external: false });
          // liff.closeWindow();これを実行するとLIFFでなくLINEが閉じてしまうため、含めない。
          document.title = "このウィンドウは閉じてください。";
          return;
        }
        if (liff.isLoggedIn()) loader.style.display = "block";
        else liff.login();
        userId = liff.getDecodedIDToken().sub;
        jump();
      });

    } else {
      if (liff.isLoggedIn()) {
        loader.style.display = "block";
        userId = liff.getDecodedIDToken().sub;

      } else if (!flag) {
        const ret = window.confirm("LINEでログインされていません。\n登録済みの場合、ログインするとパスワード入力が不要になります。\nログインしますか？");
        if (ret) {
          flag = 1;
          const location = document.location + "&flag=1";
          liff.login({ redirectUri: location });
          return;
        }
      }
      jump();
    }
  });
}

function jump() {

  /* ------------------------------
     ① iframe 読み込み処理
     ------------------------------ */
  if (params.get('lm')) {

    lm = "lm=" + params.get('lm');
    if (params.get('op')) op = "&op=" + params.get('op');
    id = "&id=" + userId;

    let src = "";
    if (params.get('dev') == 1)
      src = "https://script.google.com/macros/s/AKfycbzzuU7E7-Syg2FrAQyBxoJS_dLqSHw0SjaUGt6YFjEtpMtapyNyVx9QjjemKdxuYo8pgg/exec?" + lm + op + id;
    else
      src = "https://script.google.com/macros/s/AKfycbyw-r2rpN2W40EabhnJf_AGtLHS4lP8NkwJpmi_VRi46e4yIMgecfl9qr3wMygB2qhx/exec?" + lm + op + id;

    const iframe = document.getElementById("embed");
    iframe.src = src;

    loader.style.display = "block";

    let loaded = false;

    /* ------------------------------
       GAS 側からの LOADED 通知を受け取る
       ------------------------------ */
    window.addEventListener("message", (e) => {
      if (e.data.type === "TITLE") {
        loaded = true;
        loader.style.display = "none";
        document.title = e.data.value;
      }
    });

    /* ------------------------------
       タイムアウト（10秒）
       ------------------------------ */
    setTimeout(() => {
      if (!loaded) {
        window.top.location.href = src;
      }
    }, 10000);
  }

  /* ------------------------------
     ② タイトル設定（必ず実行）
     ------------------------------ */
  let cs = 0;
  for (let i = 0; i < params.get('lm').length; i++) {
    if (i !== 8 && i !== 9) cs += parseInt(params.get('lm')[i]);
  }

  lm = Number(params.get('lm'));

  if (params.get('op') == "edit") {
    title = lm % 1000 + "番の区域の編集";
  } else if (lm % 100000 >= 50000) {
    title = "区域番号" + (lm % 1000);
  } else {
    title = "区域の閲覧";
  }

  document.title = title;
  loader.classList.add('loaded');
}
</script>

</body>
</html>
